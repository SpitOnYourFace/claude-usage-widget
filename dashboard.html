<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self';">
<title>Claude Meter — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0c0c12;
    --surface: #13131d;
    --surface2: #1b1b28;
    --border: #2a2a3d;
    --text: #e2e2f0;
    --text-dim: #7e7e98;
    --accent: #d4845a;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --bar-bg: #252538;
    --bar-fill: #7c7cba;
  }
  body {
    font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }
  .body-content {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 200px;
    min-width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding-top: 20px;
  }
  .sidebar-title {
    font-size: 14px;
    font-weight: 700;
    padding: 0 20px 20px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .sidebar-nav {
    list-style: none;
    flex: 1;
  }
  .sidebar-nav li {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
  }
  .sidebar-nav li:hover {
    color: var(--text);
    background: var(--surface2);
  }
  .sidebar-nav li.active {
    color: var(--text);
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .sidebar-version {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    margin-bottom: 8px;
  }
  .update-now-btn {
    display: none;
    width: 100%;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #c06a3a);
    color: #fff;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    box-shadow: 0 0 10px rgba(212, 132, 90, 0.25);
  }
  .update-now-btn:hover {
    box-shadow: 0 0 16px rgba(212, 132, 90, 0.45);
    transform: translateY(-1px);
  }
  .update-now-btn:active { transform: translateY(0); }
  .update-now-btn.visible {
    display: block;
  }
  .update-now-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .update-now-btn.downloading {
    background: var(--surface2);
    border-color: var(--border);
    box-shadow: none;
    animation: pulse-dl 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dl {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  .update-progress {
    display: none;
    margin-top: 6px;
    height: 4px;
    background: var(--bar-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .update-progress.visible {
    display: block;
  }
  .update-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* --- Main content --- */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }
  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* --- Overview tab --- */
  .overview-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .usage-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }
  .usage-card .card-label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .usage-card .bar-track {
    height: 18px;
    background: var(--bar-bg);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .usage-card .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--bar-fill);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    min-width: 2px;
  }
  .usage-card .bar-fill.warning { background: var(--yellow); }
  .usage-card .bar-fill.danger { background: var(--red); }
  .usage-card .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  /* --- Planner --- */
  .planner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-top: 16px;
  }
  .planner-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .planner-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .planner-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .planner-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .planner-badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .planner-badge.on-track {
    background: rgba(74, 222, 128, 0.12);
    color: var(--green);
  }
  .planner-badge.on-track .planner-badge-dot { background: var(--green); }
  .planner-badge.watch {
    background: rgba(250, 204, 21, 0.12);
    color: var(--yellow);
  }
  .planner-badge.watch .planner-badge-dot { background: var(--yellow); }
  .planner-badge.at-risk {
    background: rgba(248, 113, 113, 0.12);
    color: var(--red);
  }
  .planner-badge.at-risk .planner-badge-dot { background: var(--red); }
  .planner-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }
  .planner-stat {
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .planner-stat-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .planner-stat-value {
    font-size: 16px;
    font-weight: 700;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .planner-stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .planner-recommendation {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-dim);
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* --- History tab --- */
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .chart-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .chart-btn {
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chart-btn:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }
  .chart-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  #historyCanvas {
    width: 100%;
    height: 320px;
    display: block;
  }

  /* --- Alerts tab --- */
  .alert-rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .alert-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .alert-row .alert-label {
    font-size: 13px;
    font-weight: 600;
  }
  .alert-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .alert-value {
    font-size: 14px;
    font-weight: 700;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    min-width: 40px;
    text-align: center;
    color: var(--accent);
  }
  .alert-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .alert-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* --- Alert presets --- */
  .alert-presets {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .preset-chip {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .preset-chip:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }
  .preset-chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* --- Settings tab --- */
  .setting-rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .setting-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }
  .setting-row .setting-label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .setting-row .setting-value {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  .hotkey-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }
  .hotkey-display {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    min-width: 80px;
    text-align: center;
  }
  .hotkey-display.recording {
    border-color: var(--accent);
    color: var(--accent);
    animation: pulse-hotkey 1.2s ease-in-out infinite;
  }
  @keyframes pulse-hotkey {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  .hotkey-change-btn {
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .hotkey-change-btn:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }
  .hotkey-status {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .hotkey-status.success { color: var(--green); }
  .hotkey-status.error { color: var(--red); }
  .update-banner {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 14px 20px;
    margin-bottom: 16px;
    display: none;
    font-size: 13px;
  }
  .update-banner.visible {
    display: block;
  }
  .update-btn {
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 8px;
  }
  .update-btn:hover {
    opacity: 0.85;
  }
  .version-info {
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  /* --- Custom title bar --- */
  .titlebar {
    height: 36px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .titlebar-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }
  .titlebar-controls {
    display: flex;
    gap: 8px;
    -webkit-app-region: no-drag;
  }
  .titlebar-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .titlebar-btn:hover { opacity: 1; }
  .titlebar-btn.tb-minimize { background: var(--yellow); }
  .titlebar-btn.tb-maximize { background: var(--green); }
  .titlebar-btn.tb-close { background: var(--red); }

  /* --- Scrollbar --- */
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  .main::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
  }
</style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-title">Claude Meter — Dashboard</span>
  <div class="titlebar-controls">
    <button class="titlebar-btn tb-minimize" id="tbMinimize" title="Minimize"></button>
    <button class="titlebar-btn tb-maximize" id="tbMaximize" title="Maximize"></button>
    <button class="titlebar-btn tb-close" id="tbClose" title="Close"></button>
  </div>
</div>

<div class="body-content">
<div class="sidebar">
  <div class="sidebar-title">Claude Meter</div>
  <ul class="sidebar-nav">
    <li class="active" data-tab="overview">Overview</li>
    <li data-tab="history">History</li>
    <li data-tab="alerts">Alerts</li>
    <li data-tab="settings">Settings</li>
  </ul>
  <div class="sidebar-footer">
    <div class="sidebar-version" id="sidebarVersion">v2.0.0</div>
    <button class="update-now-btn" id="updateNowBtn">Update Now</button>
    <div class="update-progress" id="updateProgress">
      <div class="update-progress-fill" id="updateProgressFill"></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="tab-content active" id="tab-overview">
    <div class="section-title">Usage Overview</div>
    <div class="overview-cards" id="overviewCards"></div>
    <div class="planner">
      <div class="planner-title">Session Planner</div>
      <div class="planner-text" id="plannerText">Waiting for data...</div>
    </div>
  </div>

  <div class="tab-content" id="tab-history">
    <div class="section-title">Usage History</div>
    <div class="chart-container">
      <div class="chart-controls">
        <button class="chart-btn active" data-days="7">7d</button>
        <button class="chart-btn" data-days="14">14d</button>
        <button class="chart-btn" data-days="30">30d</button>
      </div>
      <canvas id="historyCanvas"></canvas>
    </div>
  </div>

  <div class="tab-content" id="tab-alerts">
    <div class="section-title">Alert Thresholds</div>
    <div class="alert-rows" id="alertRows"></div>
  </div>

  <div class="tab-content" id="tab-settings">
    <div class="section-title">Settings</div>
    <div class="update-banner" id="updateBanner"></div>
    <div class="setting-rows" id="settingRows"></div>
    <div class="version-info" id="versionInfo"></div>
  </div>
</div>

</div>
<script src="dashboard.js"></script>
</body>
</html>
