<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self';">
<title>Claude Meter — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0c0c12;
    --surface: #13131d;
    --surface2: #1b1b28;
    --border: #2a2a3d;
    --text: #e2e2f0;
    --text-dim: #7e7e98;
    --accent: #d4845a;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --bar-bg: #252538;
    --bar-fill: #7c7cba;
  }
  body {
    font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    user-select: none;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 200px;
    min-width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding-top: 20px;
  }
  .sidebar-title {
    font-size: 14px;
    font-weight: 700;
    padding: 0 20px 20px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .sidebar-nav {
    list-style: none;
    flex: 1;
  }
  .sidebar-nav li {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
  }
  .sidebar-nav li:hover {
    color: var(--text);
    background: var(--surface2);
  }
  .sidebar-nav li.active {
    color: var(--text);
    background: var(--surface2);
    border-left-color: var(--accent);
  }

  /* --- Main content --- */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }
  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* --- Overview tab --- */
  .overview-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .usage-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }
  .usage-card .card-label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .usage-card .bar-track {
    height: 18px;
    background: var(--bar-bg);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .usage-card .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--bar-fill);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    min-width: 2px;
  }
  .usage-card .bar-fill.warning { background: var(--yellow); }
  .usage-card .bar-fill.danger { background: var(--red); }
  .usage-card .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  /* --- Planner --- */
  .planner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-top: 16px;
  }
  .planner-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .planner-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  /* --- History tab --- */
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .chart-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .chart-btn {
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chart-btn:hover {
    color: var(--text);
    border-color: var(--text-dim);
  }
  .chart-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  #historyCanvas {
    width: 100%;
    height: 320px;
    display: block;
  }

  /* --- Alerts tab --- */
  .alert-rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .alert-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .alert-row .alert-label {
    font-size: 13px;
    font-weight: 600;
  }
  .alert-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .alert-value {
    font-size: 14px;
    font-weight: 700;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    min-width: 40px;
    text-align: center;
    color: var(--accent);
  }
  .alert-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .alert-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* --- Settings tab --- */
  .setting-rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .setting-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }
  .setting-row .setting-label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .setting-row .setting-value {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  .update-banner {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 14px 20px;
    margin-bottom: 16px;
    display: none;
    font-size: 13px;
  }
  .update-banner.visible {
    display: block;
  }
  .update-btn {
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 8px;
  }
  .update-btn:hover {
    opacity: 0.85;
  }
  .version-info {
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  /* --- Scrollbar --- */
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  .main::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-title">Claude Meter</div>
  <ul class="sidebar-nav">
    <li class="active" data-tab="overview">Overview</li>
    <li data-tab="history">History</li>
    <li data-tab="alerts">Alerts</li>
    <li data-tab="settings">Settings</li>
  </ul>
</div>

<div class="main">
  <div class="tab-content active" id="tab-overview">
    <div class="section-title">Usage Overview</div>
    <div class="overview-cards" id="overviewCards"></div>
    <div class="planner">
      <div class="planner-title">Session Planner</div>
      <div class="planner-text" id="plannerText">Waiting for data...</div>
    </div>
  </div>

  <div class="tab-content" id="tab-history">
    <div class="section-title">Usage History</div>
    <div class="chart-container">
      <div class="chart-controls">
        <button class="chart-btn active" data-days="7">7d</button>
        <button class="chart-btn" data-days="14">14d</button>
        <button class="chart-btn" data-days="30">30d</button>
      </div>
      <canvas id="historyCanvas"></canvas>
    </div>
  </div>

  <div class="tab-content" id="tab-alerts">
    <div class="section-title">Alert Thresholds</div>
    <div class="alert-rows" id="alertRows"></div>
  </div>

  <div class="tab-content" id="tab-settings">
    <div class="section-title">Settings</div>
    <div class="update-banner" id="updateBanner"></div>
    <div class="setting-rows" id="settingRows"></div>
    <div class="version-info" id="versionInfo"></div>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
