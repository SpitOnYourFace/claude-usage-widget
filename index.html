<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self';">
<title>Claude Meter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0c0c12;
    --surface: #13131d;
    --surface2: #1b1b28;
    --border: #2a2a3d;
    --text: #e2e2f0;
    --text-dim: #7e7e98;
    --accent: #d4845a;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --bar-bg: #252538;
    --bar-fill: #7c7cba;
  }
  body {
    font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }
  .widget {
    padding: 20px 24px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .dot.syncing { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse 0.5s infinite; }
  .dot.stale { background: var(--text-dim); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .title { font-size: 14px; font-weight: 600; }
  .sync-status {
    font-size: 8px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    display: flex; align-items: center; gap: 3px;
  }
  .sync-status.live { color: var(--green); }
  .sync-status.syncing { color: var(--yellow); }
  .sync-status .mini-dot {
    width: 4px; height: 4px; border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  .sync-status.live .mini-dot { background: var(--green); }
  .sync-status.syncing .mini-dot { background: var(--yellow); }
  .window-controls {
    display: flex; gap: 6px;
    -webkit-app-region: no-drag;
  }
  .win-btn {
    width: 12px; height: 12px; border-radius: 50%;
    border: none; cursor: pointer; opacity: 0.6;
    transition: opacity 0.2s;
  }
  .win-btn:hover { opacity: 1; }
  .win-btn.minimize { background: var(--yellow); }
  .win-btn.close { background: var(--red); }

  .usage-section { margin-bottom: 16px; }
  .usage-row { margin-bottom: 14px; }
  .usage-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .bar-container { display: flex; align-items: center; gap: 10px; }
  .bar-track {
    flex: 1; height: 14px; background: var(--bar-bg);
    border-radius: 3px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 3px;
    background: var(--bar-fill);
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    min-width: 2px;
  }
  .bar-fill.warning { background: var(--yellow); }
  .bar-fill.danger { background: var(--red); }
  .bar-pct {
    font-size: 12px; font-weight: 600;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    min-width: 70px; text-align: right;
    color: var(--text-dim);
  }
  .sparkline {
    width: 60px; height: 14px;
    flex-shrink: 0;
  }
  .sparkline polyline {
    fill: none;
    stroke: var(--bar-fill);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .sparkline.warning polyline { stroke: var(--yellow); }
  .sparkline.danger polyline { stroke: var(--red); }
  .reset-info {
    font-size: 10px; color: var(--text-dim);
    margin-top: 3px; font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  .extra-section {
    border-top: 1px solid var(--border);
    padding-top: 12px; margin-top: 4px;
  }
  .extra-label { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
  .extra-info { font-size: 11px; color: var(--text-dim); }
  .footer {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-hint {
    font-size: 10px; color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  /* Compact mode */
  body.compact .usage-label { display: none; }
  body.compact .reset-info { display: none; }
  body.compact .extra-section { display: none; }
  body.compact .bar-track { height: 10px; }
  body.compact .usage-row { margin-bottom: 8px; }
  body.compact .widget { padding: 12px 16px; }
  body.compact .header { margin-bottom: 12px; }
  body.compact .sparkline { display: none; }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <div class="header-left">
      <span class="dot stale" id="statusDot"></span>
      <span class="title">Claude Meter</span>
      <span class="sync-status" id="syncStatus"></span>
    </div>
    <div class="window-controls">
      <button class="win-btn minimize" id="minimizeBtn" title="Minimize to tray (Ctrl+\)"></button>
      <button class="win-btn close" id="closeBtn" title="Quit"></button>
    </div>
  </div>

  <div class="usage-section">
    <div class="usage-row" id="sessionRow"></div>
    <div class="usage-row" id="weekAllRow"></div>
    <div class="usage-row" id="weekSonnetRow"></div>
  </div>

  <div class="extra-section">
    <div class="extra-label">Extra usage</div>
    <div class="extra-info" id="extraInfo">Loading...</div>
  </div>

  <div class="footer">
    <span class="footer-hint" id="footerHint">Syncing...</span>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
