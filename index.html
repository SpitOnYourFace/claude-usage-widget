<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self';">
<title>Claude Meter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0c0c12;
    --surface: #13131d;
    --surface2: #1b1b28;
    --border: #2a2a3d;
    --text: #e2e2f0;
    --text-dim: #7e7e98;
    --accent: #d4845a;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --bar-bg: #252538;
    --bar-fill: #7c7cba;
  }
  body {
    font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
    display: flex;
    flex-direction: column;
  }
  .widget {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  .usage-rows {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .dot.syncing { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse 0.5s infinite; }
  .dot.stale { background: var(--text-dim); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .title { font-size: 14px; font-weight: 600; }
  .sync-status {
    font-size: 8px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    display: flex; align-items: center; gap: 3px;
  }
  .sync-status.live { color: var(--green); }
  .sync-status.syncing { color: var(--yellow); }
  .sync-status .mini-dot {
    width: 4px; height: 4px; border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  .sync-status.live .mini-dot { background: var(--green); }
  .sync-status.syncing .mini-dot { background: var(--yellow); }
  .window-controls {
    display: flex; gap: 6px;
    -webkit-app-region: no-drag;
  }
  .win-btn {
    width: 12px; height: 12px; border-radius: 50%;
    border: none; cursor: pointer; opacity: 0.6;
    transition: opacity 0.2s;
  }
  .win-btn:hover { opacity: 1; }
  .win-btn.minimize { background: var(--yellow); }
  .win-btn.close { background: var(--red); }
  .dash-btn {
    width: 18px; height: 18px; border: none; border-radius: 4px;
    background: var(--surface2); color: var(--text-dim);
    cursor: pointer; -webkit-app-region: no-drag;
    font-size: 12px; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s;
    padding: 0; margin-left: 4px;
  }
  .dash-btn:hover { background: var(--border); color: var(--accent); }
  .dash-btn svg { width: 12px; height: 12px; }

  .usage-section { margin-bottom: 16px; }
  .usage-row { margin-bottom: 12px; }
  .usage-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .bar-container { display: flex; align-items: center; gap: 6px; }
  .bar-track {
    flex: 1; height: 14px; background: var(--bar-bg);
    border-radius: 3px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 3px;
    background: var(--bar-fill);
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    min-width: 2px;
  }
  .bar-fill.warning { background: var(--yellow); }
  .bar-fill.danger { background: var(--red); }
  .bar-pct {
    font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    min-width: 32px; text-align: right;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .reset-info {
    font-size: 10px; color: var(--text-dim);
    margin-top: 3px; font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  .extra-section {
    border-top: 1px solid var(--border);
    padding-top: 12px; margin-top: 4px;
  }
  .extra-label { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
  .extra-info { font-size: 11px; color: var(--text-dim); }
  .footer {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .footer-left {
    display: flex; align-items: center; gap: 8px;
  }
  .footer-hint {
    font-size: 10px; color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  .footer-hint.stale { color: var(--yellow); }
  .footer-hint.error { color: var(--red); }
  .refresh-btn {
    width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 5px;
    background: var(--surface2); color: var(--text);
    cursor: pointer; -webkit-app-region: no-drag;
    font-size: 14px; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s;
    padding: 0;
  }
  .refresh-btn:hover { background: var(--border); color: var(--accent); }
  .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .footer-update-btn {
    display: none;
    padding: 4px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: 1px solid var(--accent);
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #c06a3a);
    color: #fff;
    cursor: pointer;
    -webkit-app-region: no-drag;
    transition: all 0.25s ease;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    box-shadow: 0 0 8px rgba(212, 132, 90, 0.3);
  }
  .footer-update-btn:hover {
    box-shadow: 0 0 14px rgba(212, 132, 90, 0.5);
    transform: translateY(-1px);
  }
  .footer-update-btn:active { transform: translateY(0); }
  .footer-update-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .footer-update-btn.visible { display: inline-block; }
  .footer-update-btn.downloading {
    background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899) no-repeat left / 0% 100%, var(--surface2);
    border-color: rgba(139, 92, 246, 0.4);
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
    transition: background-size 0.4s ease;
  }

  /* Setup overlay */
  .setup-overlay {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    flex: 1;
    min-height: 0;
  }
  .setup-overlay.visible { display: flex; }
  .setup-overlay .setup-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.8;
  }
  .setup-overlay .setup-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }
  .setup-overlay .setup-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .setup-overlay .setup-steps {
    text-align: left;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 2;
    margin-bottom: 16px;
  }
  .setup-overlay .setup-steps .step-num {
    display: inline-block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    line-height: 17px;
    margin-right: 6px;
  }
  .setup-overlay .setup-btn {
    padding: 10px 28px;
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #c06a3a);
    color: #fff;
    cursor: pointer;
    -webkit-app-region: no-drag;
    transition: all 0.25s ease;
    box-shadow: 0 0 12px rgba(212, 132, 90, 0.3);
    margin-bottom: 12px;
  }
  .setup-overlay .setup-btn:hover {
    box-shadow: 0 0 20px rgba(212, 132, 90, 0.5);
    transform: translateY(-1px);
  }
  .setup-overlay .setup-btn:active { transform: translateY(0); }
  .setup-overlay .setup-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .setup-overlay .setup-install-link {
    font-size: 10px;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    -webkit-app-region: no-drag;
    opacity: 0.8;
    transition: opacity 0.2s;
    background: none;
    border: none;
    font-family: inherit;
  }
  .setup-overlay .setup-install-link:hover { opacity: 1; }
  .setup-overlay .setup-waiting {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .setup-overlay .setup-waiting .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--yellow);
    animation: pulse 1.5s infinite;
  }

  /* Compact mode */
  body.compact .usage-label { display: none; }
  body.compact .reset-info { display: none; }
  body.compact .extra-section { display: none; }
  body.compact .bar-track { height: 10px; }
  body.compact .usage-row { margin-bottom: 8px; }
  body.compact .widget { padding: 12px 16px; }
  body.compact .header { margin-bottom: 12px; }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <div class="header-left">
      <span class="dot stale" id="statusDot"></span>
      <span class="title">Claude Meter</span>
      <span class="sync-status" id="syncStatus"></span>
      <button class="dash-btn" id="dashBtn" title="Open Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
    <div class="window-controls">
      <button class="win-btn minimize" id="minimizeBtn" title="Minimize to tray (Ctrl+\)"></button>
      <button class="win-btn close" id="closeBtn" title="Quit"></button>
    </div>
  </div>

  <div class="setup-overlay" id="setupOverlay">
    <div class="setup-icon">&#x1F50C;</div>
    <div class="setup-title" id="setupTitle">Connect to Claude</div>
    <div class="setup-desc" id="setupDesc">Sign in with your Anthropic account to start tracking usage.</div>
    <button class="setup-btn" id="setupSignInBtn">Sign In</button>
    <div class="setup-waiting" id="setupWaiting" style="display:none">
      <span class="dot"></span>
      <span>Waiting for browser login...</span>
    </div>
    <button class="setup-install-link" id="setupInstallLink" style="display:none">Install Claude Code first</button>
  </div>

  <div class="usage-rows" id="usageRows">
    <div class="usage-section">
      <div class="usage-row" id="sessionRow"></div>
      <div class="usage-row" id="weekAllRow"></div>
      <div class="usage-row" id="weekSonnetRow"></div>
    </div>

    <div class="extra-section">
      <div class="extra-label">Extra usage</div>
      <div class="extra-info" id="extraInfo">Loading...</div>
    </div>
  </div>

  <div class="footer">
    <button class="footer-update-btn" id="updateBtn"></button>
    <div class="footer-left">
      <button class="refresh-btn" id="refreshBtn" title="Refresh now">&#x21bb;</button>
      <span class="footer-hint" id="footerHint">Syncing...</span>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
