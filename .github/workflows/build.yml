name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_cmd: npx electron-builder --win --publish never
          - os: macos-latest
            build_cmd: npx electron-builder --mac --publish never
          - os: ubuntu-latest
            build_cmd: npx electron-builder --linux --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
